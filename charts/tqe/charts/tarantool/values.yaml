# Tarantool cluster's config (for now, we use TarantoolDB instead of Tarantool)
config:
  parameters:
    config:
      context:
        admin_password:
          from: env
          env: TT_ADMIN_PASSWORD
    log:
      to: stderr
      format: 'json'
      level: 'info'
    # audit_log:
    #   to: file
    #   file: 'audit.log'
    #   format: json
    iproto:
      advertise:
        peer:
          login: admin
        sharding:
          login: admin
    groups:
      *storageGroupName:
