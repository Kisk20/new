        {{- if not (empty $.Values.sink.commonConfigMaps) }}
        {{- range $.Values.sink.commonConfigMaps }}
        - name: {{ .name }}
          configMap:
            name: {{ .name }}
            items:
            - key: {{ .file }}
              path: {{ .file }}
        {{- end }}
        {{- end }}
        {{- if not (empty $.Values.sink.commonSecrets) }}
        {{- range $.Values.sink.commonSecrets }}
